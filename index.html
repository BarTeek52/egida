<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egida OS | Grupa Pallada Trans</title>

<!-- Biblioteki zewnętrzne -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>


</head>
<body class="bg-[#f8fafc]">
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // --- TWOJA KONFIGURACJA FIREBASE (Z PROJEKTU EGIDA-OS) ---
    const firebaseConfig = {
        apiKey: "AIzaSyD8ioxiSN03mI_ppLRezGdj-b5hCB7-hwg",
        authDomain: "egida-os.firebaseapp.com",
        projectId: "egida-os",
        storageBucket: "egida-os.firebasestorage.app",
        messagingSenderId: "263654193064",
        appId: "1:263654193064:web:70adeef7eefbd944364f9d"
    };

    // Inicjalizacja usług Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Komponent ikony Lucide
    const Icon = ({ name, size = 20, className = "" }) => {
        const [iconHtml, setIconHtml] = useState("");
        useEffect(() => {
            if (window.lucide) {
                const icon = window.lucide.icons[name];
                if (icon) setIconHtml(icon.toSvg({ width: size, height: size, class: className }));
            }
        }, [name, size, className]);
        return <span dangerouslySetInnerHTML={{ __html: iconHtml }} />;
    };

    const TOWARZYSTWA = [
        "PZU S.A.", "STU ERGO HESTIA S.A.", "GENERALI TU S.A.", "TUiR WARTA S.A.",
        "Compensa TU S.A", "Aviva S.A.", "ALLIANZ Polska S.A. TUiR", "BENEFIA TU S.A.",
        "InterRisk TU S.A.", "LINK4 TU S.A.", "Proama (Generali TU S.A.)", "TUW TUW",
        "TUZ TUW", "UNIQA TU S.A.", "MTU ( STU ERGO HESTIA S.A.)",
        "Pocztowe Towarzystwo Ubezpieczeń Wzajemnych", "Balcia Insurance SE",
        "Wiener TU S.A.", "Accredited Insurance", "INSURANCE COMPANY EUROINS AD",
        "ZAVAROVALNICA TRIGLAV D.D. (Trasti)", "WEFOX INSURANCE AG ODDZIAŁ W POLSCE",
        "PKO Towarzystwo Ubezpieczeń S.A."
    ];

    const formatTitleCase = (text) => text ? text.toLowerCase().replace(/(?:^|\s|-)\p{L}/gu, (match) => match.toUpperCase()) : '';
    const formatToPLDate = (dateStr) => {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        return parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : dateStr;
    };

    // --- EKRAN LOGOWANIA ---
    const LoginScreen = ({ onLogin }) => {
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState('');

        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            try {
                await onLogin(email, password);
            } catch (err) {
                setError("Błąd logowania. Sprawdź e-mail i hasło.");
                setLoading(false);
            }
        };

        return (
            <div className="h-screen flex items-center justify-center bg-[#f8fafc] p-4 text-left">
                <div className="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-md border border-slate-50 space-y-8 animate-in zoom-in-95">
                    <div className="text-center space-y-4">
                        <div className="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center shadow-xl shadow-blue-100">
                            <Icon name="Shield" size={40} className="text-white" />
                        </div>
                        <h1 className="text-3xl font-black text-slate-900 uppercase tracking-tighter">Egida OS</h1>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">System Grupy Pallada Trans</p>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold" placeholder="Email Agenta" required />
                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none font-bold" placeholder="Hasło" required />
                        {error && <p className="text-red-500 text-[10px] font-black uppercase text-center">{error}</p>}
                        <button type="submit" disabled={loading} className="w-full py-5 bg-slate-900 text-white rounded-2xl font-black uppercase tracking-widest hover:bg-slate-800 transition-all">
                            {loading ? "Autoryzacja..." : "Zaloguj"}
                        </button>
                    </form>
                </div>
            </div>
        );
    };

    const App = () => {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [currentModule, setCurrentModule] = useState('dashboard');
        const [dbRecords, setDbRecords] = useState([]);
        const [searchPlate, setSearchPlate] = useState('');
        const [actionStatus, setActionStatus] = useState(null);
        const [errors, setErrors] = useState([]);

        const initialFormData = {
            imieNazwisko: '', ulica: '', kodPocztowy: '', miejscowosc: '',
            ubezpieczyciel: '', numerPolisy: '', dataRozwiazania: '', dataPodpisania: '',
            miejscowoscWystawienia: '', marka: '', model: '', nrRejestracyjny: '', art: '28'
        };
        const [formData, setFormData] = useState(initialFormData);

        useEffect(() => {
            const unsubAuth = onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });
            return () => unsubAuth();
        }, []);

        useEffect(() => {
            if (!user) return;
            const unsub = onSnapshot(collection(db, "pojazdy"), (snap) => {
                const records = [];
                snap.forEach(doc => records.push({ id: doc.id, ...doc.data() }));
                setDbRecords(records);
            });
            return () => unsub();
        }, [user]);

        const handleSearch = () => {
            const normalized = searchPlate.replace(/\s/g, '').toUpperCase();
            const record = dbRecords.find(r => r.nrRejestracyjny?.replace(/\s/g, '').toUpperCase() === normalized);
            if (record) {
                setFormData(prev => ({ ...prev, ...record, nrRejestracyjny: record.nrRejestracyjny.toUpperCase() }));
                setErrors([]);
            } else { setFormData(prev => ({ ...prev, nrRejestracyjny: normalized })); }
        };

        const handleGenerate = async () => {
            const required = ['imieNazwisko', 'ulica', 'kodPocztowy', 'miejscowosc', 'nrRejestracyjny', 'marka', 'model', 'ubezpieczyciel', 'numerPolisy', 'dataRozwiazania', 'dataPodpisania', 'miejscowoscWystawienia'];
            const newErrors = required.filter(f => !formData[f]?.trim());
            if (newErrors.length > 0) { setErrors(newErrors); setActionStatus('validation_error'); return; }

            setActionStatus('saving');
            try {
                const docId = formData.nrRejestracyjny.replace(/\s/g, '').toUpperCase();
                await setDoc(doc(db, "pojazdy", docId), { ...formData, updatedAt: new Date().toISOString() });
                
                const { jsPDF } = window.jspdf;
                const docPdf = new jsPDF();
                
                const loadF = async (u, n, f, s) => { 
                    const r = await fetch(u); 
                    const b = await r.arrayBuffer(); 
                    let bi = ''; 
                    const bt = new Uint8Array(b); 
                    for(let i=0; i<bt.byteLength; i++) bi += String.fromCharCode(bt[i]); 
                    docPdf.addFileToVFS(n, window.btoa(bi)); 
                    docPdf.addFont(n, f, s); 
                };
                await loadF('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/fonts/Roboto/Roboto-Regular.ttf', 'R-R.ttf', 'R', 'normal');
                await loadF('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/fonts/Roboto/Roboto-Medium.ttf', 'R-B.ttf', 'R', 'bold');

                const palladaBlue = [0, 103, 177];
                
                // Ładowanie Logo z repozytorium
                await new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => { docPdf.addImage(img, 'PNG', 20, 15, 25, 25); resolve(); };
                    img.onerror = () => { 
                        docPdf.setFont("helvetica", "bold"); docPdf.setFontSize(22); docPdf.setTextColor(...palladaBlue); docPdf.text("PALLADA TRANS", 20, 30); resolve(); 
                    };
                    img.src = './Logo- tarcza.png';
                });

                docPdf.setFont("R", "bold"); docPdf.setFontSize(11); docPdf.setTextColor(0);
                docPdf.text(formatTitleCase(formData.imieNazwisko), 190, 20, { align: 'right' }); 
                docPdf.setFont("R", "normal"); docPdf.setFontSize(10);
                docPdf.text(`${formData.ulica}`, 190, 26, { align: 'right' });
                docPdf.text(`${formData.kodPocztowy} ${formData.miejscowosc}`, 190, 32, { align: 'right' });

                docPdf.setDrawColor(...palladaBlue); docPdf.setLineWidth(0.2); docPdf.line(20, 48, 190, 48);
                
                docPdf.setFontSize(14); docPdf.setFont("R", "bold"); docPdf.setTextColor(...palladaBlue);
                docPdf.text("WYPOWIEDZENIE UMOWY OC POSIADACZA POJAZDU", 105, 75, { align: 'center' });

                docPdf.setTextColor(0); docPdf.setFontSize(11); docPdf.setFont("R", "normal");
                const formattedDate = formatToPLDate(formData.dataRozwiazania);
                const t1 = "Proszę o rozwiązanie z dniem ";
                docPdf.text(t1, 20, 95); 
                docPdf.setFont("R", "bold"); docPdf.text(formattedDate, 20 + docPdf.getTextWidth(t1), 95);

                const blockY = 110;
                const drawD = (x, y, l, v) => { docPdf.setFontSize(8); docPdf.setTextColor(100); docPdf.text(l.toUpperCase(), x, y); docPdf.setFontSize(12); docPdf.setTextColor(0); docPdf.setFont("R", "bold"); docPdf.text(v || "---", x, y + 7); };
                drawD(20, blockY, "Polisa", formData.numerPolisy); drawD(75, blockY, "Pojazd", `${formData.marka} ${formData.model}`.toUpperCase()); drawD(145, blockY, "Nr Rej", formData.nrRejestracyjny.toUpperCase());

                const signY = 240;
                docPdf.setFontSize(10); docPdf.setFont("R", "normal");
                docPdf.text(`${formData.miejscowoscWystawienia}, dnia ${formatToPLDate(formData.dataPodpisania)}`, 20, signY + 15);
                docPdf.line(130, signY + 10, 190, signY + 10);
                docPdf.setFontSize(8); docPdf.text("CZYTELNY PODPIS KLIENTA", 160, signY + 15, { align: 'center' });

                docPdf.save(`wypowiedzenie_${formData.nrRejestracyjny}.pdf`);
                setActionStatus('success');
                setTimeout(() => setActionStatus(null), 3000);
            } catch (e) { setActionStatus('error'); }
        };

        const inCl = (f) => `w-full p-3 rounded-xl border outline-none font-bold text-sm ${errors.includes(f) ? 'border-red-500 bg-red-50' : 'border-slate-100 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all'}`;

        if (loading) return <div className="h-screen flex items-center justify-center bg-slate-50"><Icon name="Loader2" className="animate-spin text-blue-600" size={40} /></div>;
        if (!user) return <LoginScreen onLogin={(e, p) => signInWithEmailAndPassword(auth, e, p)} />;

        return (
            <div className="flex h-screen overflow-hidden text-left">
                <aside className="w-72 bg-white border-r border-slate-100 flex flex-col p-8 shrink-0 text-left">
                    <div className="flex items-center gap-3 mb-12"><div className="p-2 bg-blue-600 rounded-xl"><Icon name="Shield" className="text-white" /></div><span className="font-black text-2xl tracking-tighter uppercase" style={{color:'#0067b1'}}>EGIDA</span></div>
                    <nav className="flex-1 space-y-2 text-left">
                        <button onClick={() => setCurrentModule('dashboard')} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${currentModule === 'dashboard' ? 'bg-slate-900 text-white shadow-xl shadow-slate-200' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name="LayoutDashboard" size={18} /> Dashboard</button>
                        <button onClick={() => setCurrentModule('wypowiedzenia')} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${currentModule === 'wypowiedzenia' ? 'bg-slate-900 text-white shadow-xl shadow-slate-200' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name="FileText" size={18} /> Wypowiedzenia</button>
                        <button onClick={() => setCurrentModule('baza')} className={`w-full flex items-center gap-4 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${currentModule === 'baza' ? 'bg-slate-900 text-white shadow-xl shadow-slate-200' : 'text-slate-400 hover:bg-slate-50'}`}><Icon name="Database" size={18} /> Baza</button>
                    </nav>
                    <button onClick={() => signOut(auth)} className="flex items-center gap-4 p-4 text-[10px] font-black uppercase text-red-500 hover:bg-red-50 rounded-2xl transition-all"><Icon name="LogOut" size={18} /> Wyloguj</button>
                </aside>

                <main className="flex-1 overflow-y-auto p-12 bg-[#f8fafc] text-left">
                    {currentModule === 'dashboard' && (
                        <div className="space-y-8 animate-in fade-in duration-500 text-left">
                            <h2 className="text-3xl font-black text-slate-900 uppercase tracking-tighter">Panel Agenta</h2>
                            <div className="grid grid-cols-2 gap-6 text-left">
                                <div className="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm text-left"><p className="text-[10px] font-black text-blue-600 uppercase mb-2">Baza danych</p><p className="text-4xl font-black text-slate-800">{dbRecords.length}</p><p className="text-sm font-bold text-slate-400">Zapisanych rekordów</p></div>
                                <button onClick={() => setCurrentModule('wypowiedzenia')} className="bg-blue-600 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-blue-200 flex items-center justify-between group text-left"><div className="text-left"><p className="font-black text-xl uppercase">Generator PDF</p><p className="text-xs text-blue-100 font-bold uppercase tracking-widest">Nowy dokument</p></div><Icon name="ChevronRight" size={30} className="group-hover:translate-x-2 transition-transform" /></button>
                            </div>
                        </div>
                    )}

                    {currentModule === 'wypowiedzenia' && (
                        <div className="max-w-4xl space-y-6 animate-in fade-in duration-500 text-left">
                            <header className="flex justify-between items-center mb-8 text-left"><h2 className="text-2xl font-black uppercase text-slate-800">Generator Wypowiedzeń OC</h2><button onClick={() => setFormData(initialFormData)} className="text-[10px] font-black text-red-500 uppercase flex items-center gap-2"><Icon name="RotateCcw" size={14}/> Wyczyść</button></header>
                            <section className="bg-white rounded-[2.5rem] p-8 border border-slate-100 shadow-sm space-y-8 text-left">
                                <div className="flex gap-4 text-left"><input type="text" placeholder="Szukaj po nr rej..." className="flex-1 p-4 bg-slate-50 rounded-2xl font-bold uppercase outline-none focus:ring-4 focus:ring-blue-50" value={searchPlate} onChange={e => setSearchPlate(e.target.value.toUpperCase())} onKeyPress={e => e.key === 'Enter' && handleSearch()} /><button onClick={handleSearch} className="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-sm shadow-lg shadow-blue-100">Szukaj</button></div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                                    <div className="space-y-4 text-left">
                                        <h3 className="font-bold text-blue-600 uppercase text-[10px] border-b pb-2">Dane Klienta</h3>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Imię i Nazwisko / Firma</label><input className={inCl('imieNazwisko')} value={formData.imieNazwisko} onChange={e => setFormData({...formData, imieNazwisko: formatTitleCase(e.target.value)})} placeholder="Jan Kowalski" /></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Ulica i numer</label><input className={inCl('ulica')} value={formData.ulica} onChange={e => setFormData({...formData, ulica: formatTitleCase(e.target.value)})} placeholder="Polna 12" /></div>
                                        <div className="flex gap-3 text-left"><div className="w-1/3"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Kod</label><input className={inCl('kodPocztowy')} value={formData.kodPocztowy} onChange={e => setFormData({...formData, kodPocztowy: e.target.value})} placeholder="00-000" /></div><div className="flex-1"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Miejscowość</label><input className={inCl('miejscowosc')} value={formData.miejscowosc} onChange={e => setFormData({...formData, miejscowosc: formatTitleCase(e.target.value)})} placeholder="Szczecin" /></div></div>
                                    </div>
                                    <div className="space-y-4 text-left">
                                        <h3 className="font-bold text-blue-600 uppercase text-[10px] border-b pb-2">Pojazd i Polisa</h3>
                                        <div className="flex gap-3 text-left"><div className="flex-1 text-left"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Marka</label><input className={inCl('marka')} value={formData.marka} onChange={e => setFormData({...formData, marka: formatTitleCase(e.target.value)})} placeholder="Toyota" /></div><div className="flex-1 text-left"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Model</label><input className={inCl('model')} value={formData.model} onChange={e => setFormData({...formData, model: formatTitleCase(e.target.value)})} placeholder="Auris" /></div></div>
                                        <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Ubezpieczyciel</label><select className={inCl('ubezpieczyciel')} value={formData.ubezpieczyciel} onChange={e => setFormData({...formData, ubezpieczyciel: e.target.value})}><option value="">Wybierz...</option>{TOWARZYSTWA.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
                                        <div className="flex gap-3 text-left"><div className="flex-1"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2 text-left">Nr Polisy</label><input className={inCl('numerPolisy')} value={formData.numerPolisy} onChange={e => setFormData({...formData, numerPolisy: e.target.value})} placeholder="XYZ123" /></div><div className="flex-1"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Data końca</label><input type="date" className={inCl('dataRozwiazania')} value={formData.dataRozwiazania} onChange={e => setFormData({...formData, dataRozwiazania: e.target.value})} /></div></div>
                                    </div>
                                </div>
                                <div className="space-y-4 text-left">
                                    <h3 className="font-bold text-blue-600 uppercase text-[10px] border-b pb-2">Podpisanie dokumentu</h3>
                                    <div className="flex gap-4 text-left"><div className="flex-1 text-left"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Miejscowość wystawienia</label><input className={inCl('miejscowoscWystawienia')} value={formData.miejscowoscWystawienia} onChange={e => setFormData({...formData, miejscowoscWystawienia: formatTitleCase(e.target.value)})} placeholder="Szczecin" /></div><div className="flex-1 text-left"><label className="text-[10px] font-bold text-slate-400 uppercase ml-2">Data podpisania</label><input type="date" className={inCl('dataPodpisania')} value={formData.dataPodpisania} onChange={e => setFormData({...formData, dataPodpisania: e.target.value})} /></div></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-left">
                                    {[
                                        {id: '28', n: 'Wypowiedzenie standardowe'}, 
                                        {id: '28a', n: 'Wypowiedzenie po wznowieniu'}, 
                                        {id: '31', n: 'Wypowiedzenie nabywcy'}
                                    ].map(a => (
                                        <button key={a.id} onClick={() => setFormData({...formData, art: a.id})} className={`p-4 rounded-2xl border flex items-center gap-3 transition-all ${formData.art === a.id ? 'bg-blue-50 border-blue-600 text-blue-600 shadow-sm' : 'bg-white border-slate-100 text-slate-400'}`}>
                                            <Icon name={formData.art === a.id ? 'CheckSquare' : 'Square'} />
                                            <div className="text-left leading-tight text-left"><span className="block font-black text-[10px] uppercase text-left">{a.n}</span><span className="text-[8px] font-bold opacity-50 uppercase text-left">Art. {a.id}</span></div>
                                        </button>
                                    ))}
                                </div>
                                <button onClick={handleGenerate} className="w-full py-6 bg-blue-600 text-white rounded-[2.5rem] font-black uppercase tracking-widest shadow-2xl shadow-blue-100 flex items-center justify-center gap-3 active:scale-[0.98] transition-all">
                                    {actionStatus === 'saving' ? <Icon name="Loader2" className="animate-spin text-center" /> : <Icon name="Download" className="text-center" />} 
                                    {actionStatus === 'saving' ? "Generowanie dokumentu..." : "Pobierz PDF i Zapisz"}
                                </button>
                            </section>
                        </div>
                    )}

                    {currentModule === 'baza' && (
                        <div className="space-y-6 animate-in fade-in duration-500 text-left">
                            <h2 className="text-2xl font-black text-slate-900 uppercase text-left">Baza Klientów</h2>
                            <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden text-left">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase text-left"><tr><th className="p-6">Klient / Miejscowość</th><th className="p-6">Pojazd / Rejestracja</th><th className="p-6 text-right">Akcje</th></tr></thead>
                                    <tbody>
                                        {dbRecords.map(r => (
                                            <tr key={r.id} className="border-t border-slate-50 hover:bg-slate-50 transition-colors">
                                                <td className="p-6 text-left"><p className="font-black text-slate-800 text-sm uppercase text-left">{r.imieNazwisko}</p><p className="text-[10px] text-slate-400 font-bold uppercase text-left">{r.miejscowosc}</p></td>
                                                <td className="p-6 text-left"><p className="font-black text-blue-600 text-sm uppercase text-left">{r.nrRejestracyjny}</p><p className="text-[10px] text-slate-400 font-bold uppercase text-left">{r.marka}</p></td>
                                                <td className="p-6 text-right"><div className="flex justify-end gap-2 text-center text-center text-center"><button onClick={() => { setFormData(r); setCurrentModule('wypowiedzenia'); }} className="p-2 text-slate-300 hover:text-blue-600 transition-colors text-center text-center"><Icon name="FileText" /></button><button onClick={async () => { if(confirm("Usunąć rekord z bazy?")) await deleteDoc(doc(db, "pojazdy", r.id)) }} className="p-2 text-slate-300 hover:text-red-500 transition-colors text-center text-center"><Icon name="Trash2" /></button></div></td>
                                            </tr>
                                        ))}
                                        {dbRecords.length === 0 && <tr><td colSpan="3" className="p-20 text-center text-slate-300 font-bold uppercase text-[10px] tracking-widest italic text-center">Baza jest pusta</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </main>
                {actionStatus === 'validation_error' && ( <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-10 py-5 rounded-3xl shadow-2xl flex items-center gap-4 animate-in slide-in-from-bottom-10 z-[100] text-center text-center"><Icon name="AlertCircle" /><span className="font-black text-xs uppercase tracking-widest text-center text-center">Uzupełnij wymagane pola!</span></div> )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>


</body>
</html>
